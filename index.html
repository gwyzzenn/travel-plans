<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行計畫</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #B0D8EE 0%, #A4D0EA 40%, #B8D8E8 100%);
  font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
  -webkit-font-smoothing: antialiased;
  color: #1A2530;
}

.page {
  max-width: 560px;
  margin: 0 auto;
  padding: 48px 20px 60px;
}

/* ── HEADER ── */
.header { margin-bottom: 20px; }
.header-title {
  font-size: clamp(26px, 6vw, 32px);
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1.15;
  color: #1A2530;
}
.header-sub {
  font-size: 14px;
  color: rgba(26,37,48,0.55);
  margin-top: 5px;
  font-weight: 400;
}

/* ── FILTER PILLS ── */
.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.8);
  border-radius: 50px;
  padding: 7px 14px;
  font-size: 13px; font-weight: 500;
  color: #1A2530;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.pill:hover { background: rgba(255,255,255,0.9); }

/* ── SEARCH ── */
.search-bar {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.8);
  border-radius: 50px;
  padding: 12px 18px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 28px;
  box-shadow: 0 2px 12px rgba(80,130,170,0.08);
}
.search-bar svg { color: rgba(26,37,48,0.35); flex-shrink: 0; }
.search-bar span { font-size: 14px; color: rgba(26,37,48,0.4); }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(26,37,48,0.5);
  margin-bottom: 12px;
}

/* ── TRIP CARD ── */
.trips { display: flex; flex-direction: column; gap: 14px; }

.trip-card {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 22px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  display: block;
  box-shadow: 0 6px 28px rgba(80,130,170,0.13);
  transition: transform 0.18s, box-shadow 0.18s;
}
.trip-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 40px rgba(80,130,170,0.2);
}

/* Illustration */
.trip-illus {
  height: 140px;
  position: relative;
  overflow: hidden;
}
.illus-left {
  position: absolute; inset: 0;
  clip-path: polygon(0 0, 58% 0, 46% 100%, 0 100%);
}
.illus-right {
  position: absolute; inset: 0;
  clip-path: polygon(54% 0, 100% 0, 100% 100%, 44% 100%);
}

/* Busan scenes */
.busan-left {
  background: linear-gradient(150deg, #8FC4D8 0%, #5A98B8 50%, #7AB0C0 100%);
}
.busan-left::before {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 75px;
  background: linear-gradient(to bottom, rgba(95,155,135,0.75), rgba(75,135,115,0.55));
  clip-path: polygon(0 100%, 0 40%, 18% 58%, 32% 22%, 50% 50%, 68% 18%, 82% 44%, 100% 30%, 100% 100%);
}
.busan-left::after {
  content: '';
  position: absolute; top: 16px; left: 14px;
  width: 65px; height: 26px;
  background: rgba(255,255,255,0.38);
  border-radius: 50px; filter: blur(5px);
}
.busan-right {
  background: linear-gradient(150deg, #E8D4B4 0%, #D4B888 40%, #C4A068 100%);
}
.busan-right::before {
  content: '';
  position: absolute; bottom: 0; left: 15%; right: 0; height: 85px;
  background: rgba(160,110,65,0.35);
  clip-path: polygon(8% 100%, 8% 28%, 13% 20%, 18% 28%, 18% 100%, 32% 100%, 32% 42%, 38% 32%, 44% 42%, 44% 100%, 62% 100%, 62% 52%, 68% 42%, 74% 52%, 74% 100%);
}

.illus-labels {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 12px 16px;
  display: flex; justify-content: space-between;
  pointer-events: none;
}
.illus-label-l {
  font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.88);
  text-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.illus-label-r {
  font-size: 11px; font-weight: 600;
  color: rgba(50,30,10,0.6);
}

.plane-badge {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 38px; height: 38px;
  background: white;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  z-index: 5;
}

/* Card body */
.trip-body { padding: 14px 18px 16px; }
.trip-status {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  padding: 3px 9px; border-radius: 10px;
  margin-bottom: 8px;
  background: rgba(80,160,120,0.12);
  color: #3A8860;
}
.trip-codes {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.trip-code {
  font-size: clamp(24px, 7vw, 30px);
  font-weight: 700; letter-spacing: -1px; line-height: 1;
}
.trip-codes-arrow { color: rgba(26,37,48,0.25); font-size: 18px; }
.trip-times {
  display: flex; justify-content: space-between;
  font-size: 12px; color: rgba(26,37,48,0.5); font-weight: 400;
}

/* Empty placeholder */
.empty-card {
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(8px);
  border: 2px dashed rgba(255,255,255,0.7);
  border-radius: 22px;
  padding: 34px 20px;
  text-align: center;
}
.empty-icon { font-size: 26px; margin-bottom: 10px; opacity: 0.45; }
.empty-text { font-size: 14px; font-weight: 600; color: rgba(26,37,48,0.5); }
.empty-sub { font-size: 12px; color: rgba(26,37,48,0.35); margin-top: 5px; }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.header       { animation: fadeUp 0.45s ease both; }
.filter-row   { animation: fadeUp 0.45s ease 0.07s both; }
.search-bar   { animation: fadeUp 0.45s ease 0.12s both; }
.section-label{ animation: fadeUp 0.45s ease 0.17s both; }
.trips        { animation: fadeUp 0.45s ease 0.22s both; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-title">我的旅行</div>
    <div class="header-sub">規劃屬於自己的旅程</div>
  </div>

  <div class="filter-row">
    <div class="pill">🏖 海灘</div>
    <div class="pill">🏙 城市</div>
    <div class="pill">🏔 山岳</div>
    <div class="pill">🍜 美食</div>
  </div>

  <div class="search-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <span>搜尋目的地⋯</span>
  </div>

  <div class="section-label">我的行程</div>
  <div class="trips">

    <a class="trip-card" href="busan_trip.html">
      <div class="trip-illus">
        <div class="illus-left busan-left"></div>
        <div class="illus-right busan-right"></div>
        <div class="illus-labels">
          <span class="illus-label-l">台北</span>
          <span class="illus-label-r">釜山</span>
        </div>
        <div class="plane-badge">✈️</div>
      </div>
      <div class="trip-body">
        <div class="trip-status">即將出發</div>
        <div class="trip-codes">
          <div class="trip-code">TPE</div>
          <div class="trip-codes-arrow">→</div>
          <div class="trip-code">PUS</div>
        </div>
        <div class="trip-times">
          <span>出發：5/29 16:40</span>
          <span>回程：6/1 21:05</span>
        </div>
      </div>
    </a>

    <div class="empty-card">
      <div class="empty-icon">🗺</div>
      <div class="empty-text">新增下一個旅行</div>
      <div class="empty-sub">下次行程整理好就放這裡</div>
    </div>

  </div>
</div>
</body>
</html>
